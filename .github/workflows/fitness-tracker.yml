name: Fitness Tracker CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: npm install

    - name: Run tests
      run: npm test || true


  sonar:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: npm install

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=Elzabeth-L_Fitness_Tracker
          -Dsonar.organization=elzabeth-l
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  docker:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:${{ github.sha }} .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:${{ github.sha }}
